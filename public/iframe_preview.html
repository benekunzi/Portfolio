<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneWord iPhone Preview</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: transparent;
            /* Changed to transparent to blend better if needed, or keep white */
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .phone-frame {
            height: 100%;
            aspect-ratio: 393 / 852;
            width: auto;
            max-width: 100%;
            background: white;
            border-radius: 4vh;
            /* Responsive radius */
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.15);
            border: 1.5vh solid #333;
            /* Responsive border */
            overflow: hidden;
            position: relative;
        }

        .dynamic-island {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 35px;
            background: black;
            border-radius: 20px;
            z-index: 1000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <div class="phone-frame">
        <div class="dynamic-island"></div>
        <!-- Assuming default Expo web port 8081, verify if different -->
        <iframe src="https://benekunzi.github.io/OneWord/"></iframe>
    </div>
</body>

</html>
