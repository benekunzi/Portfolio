<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneWord iPhone Preview</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .phone-frame {
            width: 393px;
            /* iPhone 15 width */
            height: 852px;
            /* iPhone 15 height */
            background: white;
            border-radius: 50px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.15);
            border: 12px solid #333;
            overflow: hidden;
            position: relative;
        }

        .dynamic-island {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 35px;
            background: black;
            border-radius: 20px;
            z-index: 1000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <div class="phone-frame">
        <div class="dynamic-island"></div>
        <!-- Assuming default Expo web port 8081, verify if different -->
        <iframe src="https://benekunzi.github.io/OneWord/"></iframe>
    </div>
</body>

</html>
